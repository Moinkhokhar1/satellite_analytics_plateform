<!DOCTYPE html>
<html>

<head>

    <title>Satellite Environmental Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js"></script>

</head>

<body>

    <header>
        <h1>Satellite Environmental Monitoring Dashboard</h1>
    </header>

    <div class="container">

        <div class="upload-panel">

            <h3>Upload Satellite Image</h3>

            <input type="file" id="imageUpload">
            <button onclick="upload()">Process Image</button>

        </div>

        <div class="results">

            <h2>Analysis Results</h2>

            <div class="image-grid">

                <div class="card">
                    <h4>Original Image</h4>
                    <img id="originalImg">
                </div>

                <div class="card">
                    <h4>NDVI Map</h4>
                    <img id="ndviImg">
                </div>

                <div class="card">
                    <h4>NDWI Map (Water)</h4>
                    <img id="ndwiImg">
                </div>

                <div class="card">
                    <h4>Land Classification</h4>
                    <img id="classImg">
                </div>

            </div>
            
        </div>

    </div>

    <script src="./script.js"></script>

</body>

</html>
